<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>Baixando template...</title>
</head>
<body>
  <p>Seu download vai começar automaticamente...</p>
  <script>
    fetch("default.tpl")
      .then(function(r) { return r.blob(); })
      .then(function(blob) {
        var url = URL.createObjectURL(blob);
        var a = document.createElement("a");
        a.href = url;
        a.download = "default.tpl";
        document.body.appendChild(a);
        a.click();
        URL.revokeObjectURL(url);
      });
  </script>
</body>
</html>
