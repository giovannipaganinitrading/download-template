<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>Baixando template...</title>
</head>
<body>
  <p>Seu download vai começar automaticamente...</p>
  <script>
    var a = document.createElement("a");
    a.href = "default.tpl";
    a.download = "default.tpl";
    document.body.appendChild(a);
    a.click();
  </script>
</body>
</html>
