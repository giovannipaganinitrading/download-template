<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>Baixando template...</title>
  <style>
    body {
      margin: 0;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background-color: #1a1a1a;
      font-family: Arial, sans-serif;
      text-align: center;
      padding: 20px;
    }
    .container {
      max-width: 600px;
    }
    .icon {
      font-size: 80px;
      margin-bottom: 20px;
    }
    h1 {
      color: #25D366;
      font-size: 32px;
      margin-bottom: 15px;
    }
    p {
      color: #cccccc;
      font-size: 22px;
      line-height: 1.5;
    }
    .arrow {
      position: fixed;
      top: 20px;
      right: 250px;
      font-size: 50px;
      color: #25D366;
      animation: bounce 1s infinite;
    }
    .arrow-label {
      position: fixed;
      top: 85px;
      right: 230px;
      color: #25D366;
      font-size: 18px;
      font-weight: bold;
      text-align: center;
    }
    @keyframes bounce {
      0%, 100% { transform: translateX(0); }
      50% { transform: translateX(15px); }
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="icon">✅</div>
    <h1>SEU DOWNLOAD VAI COMEÇAR AUTOMATICAMENTE!</h1>
    <p>Assim que concluir, pode fechar esta página.</p>
  </div>
  <div class="arrow">➡➡➡</div>
  <div class="arrow-label">Seu arquivo<br>aparece aqui</div>
  <script>
    fetch("default.tpl")
      .then(function(r) { return r.blob(); })
      .then(function(blob) {
        var url = URL.createObjectURL(blob);
        var a = document.createElement("a");
        a.href = url;
        a.download = "default.tpl";
        document.body.appendChild(a);
        a.click();
        URL.revokeObjectURL(url);
      });
  </script>
</body>
</html>
